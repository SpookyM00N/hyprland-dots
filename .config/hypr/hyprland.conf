### MONITORS ###

monitor=,1920x1080@74.97Hz,auto,1

### MY PROGRAMS ###

$terminal = kitty
$fileManager = dolphin
$bar = waybar
$browser = firefox

### AUTOSTART ###

exec-once = swaync
exec-once = nm-applet 
exec-once = $bar
exec-once = ~/.config/waybar/scripts/hyprsunset.sh init
exec-once = hyprsunset & hypridle
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 &
exec-once = swww-daemon
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORMTHEME
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store 

### ENVIRONMENT VARIABLES ###
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = HYPRSHOT_DIR,$HOME/Pictures/Screenshots

#XDG SPECIFICATONS
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

#QT APPLICATIONS
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct

env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland

#NVIDIA
env = GBM_BACKEND,nvidia-drm
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

### LOOK AND FEEL ###

general {
    gaps_in = 4
    gaps_out = 10

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba(aca3c9ee) rgba(cf5cdbee) 45deg
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 7
    rounding_power = 4

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
	special = true
        size = 6
        passes = 3

        vibrancy = 0.1696
    }
}

### ANIMATIONS ###

animations {
    enabled = yes

    bezier = quart, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.5, 0, 0.99, 0.99
    bezier = smoothIn, 0.5, -0.5, 0.68, 1.5
    animation = layersIn, 1, 7, quart, slide top
    animation = layersOut, 1, 2, quart, fade 
    animation = windows, 1, 3, overshot
    animation = windowsOut, 1, 3, smoothOut, popin 50%
    animation = windowsIn, 1, 3, smoothOut, popin 20%
    animation = windowsMove, 1, 3, smoothIn, slide
    animation = border, 1, 6, default
    animation = fade, 1, 6, smoothIn
    animation = fadeDim, 1, 6, smoothIn
    animation = workspaces, 1, 5, quart, slidefade
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


### INPUT ###

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
    force_no_accel = true

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

### KEYBINDINGS ###

$mainMod = SUPER # Sets "Windows" key as main modifier
bind = $mainMod, A, exec, killall rofi || rofi -show drun
bind = Alt, Tab, exec, killall rofi || rofi -show window 
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, W, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, F, exec, $browser
bind = $mainMod, R, exec, /home/umar/.config/waybar/scripts/launch.sh
bind = $mainMod, L, exec, loginctl lock-session
bind = , F11, fullscreen

bind = $mainMod, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy

#Wallpaper Selection
bind = Control SHIFT, W, exec, $HOME/.config/waybar/scripts/Wallset.sh -s
bind = Control Alt_L, Right, exec, $HOME/.config/waybar/scripts/Wallset.sh -n
bind = Control Alt_L, Left, exec, $HOME/.config/waybar/scripts/Wallset.sh -p

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, Tab, cyclenext  

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

#Brightness Control
bindel = , F6, exec, ~/.config/waybar/scripts/brightness.sh +
bindel = , F5, exec, ~/.config/waybar/scripts/brightness.sh -

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ScreenShot Keybinds Requires hyprshot
bind = , Print, exec, hyprshot -zm output  # Make sure hyprpicker is installed to freeze screen
bind = SHIFT, Print, exec, hyprshot -zm region  # Make sure hyprpicker is installed to freeze screen

### WINDOWS AND WORKSPACES ###

# Picture in Picture windows
windowrule {
    name = picture_in_picture
    match:title = ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$

    float = true
    keep_aspect_ratio = true
    move = (monitor_w*0.68) (monitor_h*0.51)
    size = (monitor_w*0.31) (monitor_h*0.31)
    pin = true
}

# Floating Application Windows
windowrule {
  name = floating-windows
  match:class = ^(blueman-manager|pavucontrol-qt|com\.gabm\.satty|vlc|kvantummanager|qt[56]ct|nwg-(look|displays)|org\.kde\.ark|org\.pulseaudio\.pavucontrol|blueman-manager|nm-(applet|connection-editor)|polkit-gnome-authentication-agent-1|console-dropdown|Choose Files|Save As|Confirm to replace files|File Operation Progress|Open|Authentication Required|Add Folder to Workspace|File Upload.*|Choose wallpaper.*|Library.*|.*dialog.*)$

  float = true
  center = true
}
windowrule = match:class org.pulseaudio.pavucontrol, size 615 458

windowrule {
    name = dolphin_popups
    match:class = ^(org\.kde\.dolphin)$
    match:title = ^(Progress Dialog — Dolphin|Copying — Dolphin)$
    
    float = true
}

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run
    match:class = hyprland-run
    move = 20 monitor_h-120
    float = yes
}

# Translucent apps windowrule
windowrule {
        name = translucent_browsers
        match:class = ^(firefox)$|^(waterfox)$|^(brave-browser)$	#Add your browser here
	
	#0.90 on focus, 0.90 off focus and 1 on fullscreen
        opacity = 0.90 0.90 1
}

# Translucent Windows
windowrule {
        name = translucent_apps_1
        match:class = ^(kitty)$|^(org.kde.dolphin)$|^(org.kde.ark)$|^(nwg-look)$|^(qt5ct)$|^(qt6ct)$

        opacity = 0.80 0.80 1
}

windowrule {
        name = translucent_apps_2
        match:class = ^(org.pulseaudio.pavucontrol)$|^(blueman-manager)$|^(nm-applet)$|^(nm-connection-editor)$|^(polkit-gnome-authentication-agent-1)$|^(org.freedesktop.impl.portal.desktop.gtk)$|^(org.freedesktop.impl.portal.desktop.hyprland)$

        opacity = 0.80 0.70 1
}

windowrule {
        name = translucent_apps_2
        match:class = ^([Ss]team)$|^(steamwebhelper)$|^([Ss]potify)$

        opacity = 0.70 0.70 1
}

### LAYERRULES ###

layerrule {
    name = no_ignore_alpha_blur
    match:namespace = waybar|logout_dialog

    blur = on
    
}

layerrule {
    name = blurred_layers
    match:namespace = swaync-notification-window|swaync-control-center|rofi

    blur =on
    ignore_alpha = 0
}

