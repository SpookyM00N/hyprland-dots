general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = screenshot 
    color = rgba(0, 0, 0, 1.0)
    blur_passes = 3 
    blur_size = 8
}

# TIME (12h)
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M %p")"
    color = rgba(242, 243, 244, 0.75)
    font_size = 90
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 120
    halign = center
    valign = center
}

# USERNAME
label {
    monitor =
    text =   $USER
    color = rgba(242, 243, 244, 0.75)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 0
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(200, 200, 200)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
}
